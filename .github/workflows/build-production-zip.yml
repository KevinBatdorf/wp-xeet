name: Build production zip file
on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build zip file
    concurrency:
      group: ${{ github.workflow }} - ${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: npm install and build
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm run build
        env:
          CI: true

      - name: Package
        uses: actions/upload-artifact@v6
        with:
          name: xeet-wp
          retention-days: 5
          path: |
            ${{ github.workspace }}/
            !${{ github.workspace }}/node_modules/
            !${{ github.workspace }}/tests/
            !${{ github.workspace }}/scripts/
            !${{ github.workspace }}/.git/
            !${{ github.workspace }}/.github/
            !${{ github.workspace }}/.wordpress-org/
            !${{ github.workspace }}/assets/
            !${{ github.workspace }}/playwright-report/
            !${{ github.workspace }}/test-results/
            !${{ github.workspace }}/package-lock.json
